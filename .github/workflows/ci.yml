name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Backend Build (DO NOT STOP PIPELINE)
      - name: Build Backend Image
        continue-on-error: true
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ssf-backend:latest ./backend 2>&1 | tee backend.log

      - name: Push Backend Image
        continue-on-error: true
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf-backend:latest 2>&1 | tee -a backend.log

      # 🔹 Frontend Build
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ssf-frontend:latest ./frontend 2>&1 | tee frontend.log

      - name: Push Frontend Image
        continue-on-error: true
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf-frontend:latest 2>&1 | tee -a frontend.log

      # 🔥 Always send logs
      - name: Send Logs to MCP
        if: always()
        run: |
          echo "Preparing logs..."

          touch combined.log

          echo "===== BACKEND LOG =====" >> combined.log
          cat backend.log >> combined.log 2>/dev/null || echo "No backend log" >> combined.log

          echo "\n===== FRONTEND LOG =====" >> combined.log
          cat frontend.log >> combined.log 2>/dev/null || echo "No frontend log" >> combined.log

          echo "\n===== STATUS =====" >> combined.log
          echo "Job Status: ${{ job.status }}" >> combined.log

          curl -X POST https://mcp.varunchavda.in/webhook \
            -H "Content-Type: multipart/form-data" \
            -F "status=${{ job.status }}" \
            -F "repo=${{ github.repository }}" \
            -F "commit=${{ github.sha }}" \
            -F "logs=@combined.log" \
            -F "run_id=${{ github.run_id }}" \
            -F "branch=${{ github.ref_name }}"