name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate tag
        id: tag
        run: |
          echo "TAG=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ssf-backend:${{ steps.tag.outputs.TAG }} ./backend 2>&1 | tee backend.log

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf-backend:${{ steps.tag.outputs.TAG }}

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ssf-frontend:${{ steps.tag.outputs.TAG }} ./frontend 2>&1 | tee frontend.log

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf-frontend:${{ steps.tag.outputs.TAG }}

  # 🔥 NEW JOB (THIS IS THE FIX)
  collect-logs:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Full Logs
        run: |
          echo "Downloading logs after job completion..."

          curl -L --fail \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs \
            -o logs.zip

      - name: Extract Logs
        run: |
          unzip logs.zip -d logs

      - name: Combine Logs
        run: |
          cat logs/*.txt > combined.log

      - name: Send Logs to MCP
        run: |
          curl -X POST https://your-mcp-server.com/analyze \
            -H "Content-Type: multipart/form-data" \
            -F "status=${{ needs.build.result }}" \
            -F "repo=${{ github.repository }}" \
            -F "logs=@combined.log"