name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate tag
        id: tag
        run: |
          echo "TAG=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ssf:${{ steps.tag.outputs.TAG }} .
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf:${{ steps.tag.outputs.TAG }}

      - name: Tag as latest
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/ssf:${{ steps.tag.outputs.TAG }} \
                     ${{ secrets.DOCKER_USERNAME }}/ssf:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf:latest