name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ssf-backend:latest ./backend 2>&1 | tee backend.log

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ssf-frontend:latest ./frontend 2>&1 | tee frontend.log

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ssf-frontend:latest

  # 🔥 NEW JOB (THIS IS THE FIX)
  collect-logs:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Download Full Logs (with retry)
      run: |
        echo "Downloading logs with retry..."

        for i in {1..10}; do
          echo "Attempt $i..."

          STATUS=$(curl -s -o logs.zip -w "%{http_code}" -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs)

          if [ "$STATUS" -eq 200 ]; then
            echo "Logs downloaded successfully ✅"
            break
          else
            echo "Logs not ready yet (status: $STATUS), retrying in 5 seconds..."
            sleep 5
          fi

          if [ $i -eq 10 ]; then
            echo "Failed to download logs after multiple attempts ❌"
            exit 1
          fi
        done

    - name: Extract Logs
      run: |
        unzip logs.zip -d logs

    - name: Combine Logs
      run: |
        cat logs/*.txt > combined.log

    - name: Send Logs to MCP
      run: |
        curl -X POST https://your-mcp-server.com/analyze \
          -H "Content-Type: multipart/form-data" \
          -F "status=${{ needs.build.result }}" \
          -F "repo=${{ github.repository }}" \
          -F "logs=@combined.log"